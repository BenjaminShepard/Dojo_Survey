<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Flask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1>Add a Friend</h1>
        <form action="/create_friend" method="post">
            <label for="fname">First Name:</label>
            <input type="text" name="fname">
            <label for="lname">Last Name:</label>
            <input type="text" name="lname">
            <label for="occ">Occupation: </label>
            <input type="text" name="occ">
            <input type="submit" name="Add Friend">
        </form>
        <h1>These are my friends</h1>
            <table class="table table-striped mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Occupation</th>
                    </tr>
                </thead>
                <tbody>
                    {% for one_friend in all_friends %}
                    <tr>
                        <td>{{ one_friend.first_name }}</td>
                        <td>{{ one_friend.last_name }}</td>
                        <td>{{ one_friend.occupation }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
    </div>
</body>
</html>

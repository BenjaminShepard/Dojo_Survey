<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users CRUD</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='/bootstrap.min.css') }}">
</head>

<body>
    <div class="container mt-3">
        <div class="card text-white bg-primary mb-3" style="max-width: 50rem;">
            <h1>USERS CR </h1>
            <div class="card-body text-white bg-secondary mb-3" style="max-width: 50rem;">
                <table class="table table-info table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Created_at</th>
                            <th>Updated_at</th>
                            <th>Actions:</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td class="align-middle">{{ user.id }}</td>
                            <td class="align-middle">
                                <a href="/users/{{ user.id }}">{{ user.first_name }}</a>
                            </td>
                            <td class="align-middle">{{ user.last_name }}</td>
                            <td class="align-middle">{{ user.email }}</td>
                            <td class="align-middle">{{ user.created_at }}</td>
                            <td class="align-middle">{{ user.updated_at }}</td>
                            <td class="d-flex gap-2">
                                <a href="/users/{{ user.id }}/edit" class="btn btn-sm btn-primary">Edit</a>
                                <form action="/users/{{ user.id }}/delete" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <form action="/users/new_user">
            <input type="submit" class="btn btn-primary mt-3" value="Create A New User!">
        </form>
    </div>
</body>

</html>

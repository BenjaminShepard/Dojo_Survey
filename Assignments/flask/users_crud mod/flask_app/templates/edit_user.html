<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='/bootstrap.min.css') }}">
</head>

<body>
    <div class="d-flex justify-content-center mt-3">
        <div class="card text-white bg-primary mb-3" style="max-width: 40rem;">
            <h1 class="d-flex justify-content-center">Edit User</h1>
            <div class="card-body text-white bg-secondary mb-3">
                <form action="/users/update" method="post">
                    <input type="hidden" name="user_id" value="{{ user.id }}">
                    <div>
                        <label for="first_name">First Name:</label>
                        <input type="text" name="first_name" id="first_name" value="{{ user.first_name }}" />
                    </div>
                    <div>
                        <label for="last_name">Last Name:</label>
                        <input type="text" class="mt-3" name="last_name" id="last_name" value="{{ user.last_name }}"/>
                    </div>
                    <div>
                        <label for="email">Email:</label>
                        <input type="text" class="mt-3" name="email" id="email" value="{{ user.email }}"/>
                    </div>
                    <a class="btn btn-primary mt-3" href="/users">Edit User</a>
                    <a class="btn btn-primary mt-3" href="/users">Back to all Users</a>
                </form>
            </div>
        </div>

    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes pt 2</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="header flex">
            <h1 class="network">Network</h1>
        </div>
        <div class="yourfeed flex">
            <h1>Your Feed</h1>
        </div>
        <div class="content flex">
            <div class="left-col">
                <div class=" single">
                    <img src="user-circle.png" alt="user-circle">
                    <div>
                        <a href="#">Add an Avatar</a>
                    </div>
                    <div>
                        <h2 class="james">James Doe</h2>
                    </div>
                </div>
            </div>
            <div class="right-col">
                <div class="neil">
                    <div class="neil3 flex">
                        <div class="name">
                            <h2>Neil M</h2>
                        </div>
                        <div class="neil-likes flex">
                            <h3 id="likes">9 like(s)</h3>
                        </div>
                        <div class="likebtn flex">
                            <button class="btn" onclick="nadd1()">Like</button>
                        </div>
                    </div>
                    <div class="neiltalk flex">
                        <p><h3>I just set up this new discord bot, <br> let me know what you all think. <div class="link"><a href="#">link</a></div></h3></p>
                    </div>
                </div>
                <div class="nichole">                
                    <div class="neil">
                        <div class="neil3 flex">
                            <div class="name">
                                <h2>Nichole K</h2>
                            </div>
                            <div class="neil-likes flex">
                                <h3 id="likes2">12 like(s)</h3>
                            </div>
                            <div class="likebtn flex">
                                <button class="btn" onclick="niadd1()">Like</button>
                            </div>
                        </div>
                        <div class="neiltalk flex">
                            <p><h3>Just finished my <div class="link"><a href="#">next comic</a></div>, check it out.</h3></p>
                        </div>
                    </div>
                </div>
                <div class="jim">                
                    <div class="neil">
                        <div class="neil3 flex">
                            <div class="name">
                                <h2>Jim R</h2>
                            </div>
                            <div class="neil-likes flex">
                                <h3 id="likes3">9 like(s)</h3>
                            </div>
                        <div class="likebtn flex">
                            <button class="btn" onclick="jadd1()">Like</button>
                        </div>
                        </div>
                    <div class="neiltalk flex">
                        <p><h3>I can't stop listening to the <div class="link"><a href="#">new album.</a> <br>Who else is liking it?</div></h3></p>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
